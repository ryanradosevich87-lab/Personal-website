backend:
  name: github
  repo: ryanradosevich87-lab/Personal-website
  branch: main
  base_url:https://voluble-gecko-170a26.netlify.app/ # <--- Change this!
  auth_endpoint: /auth
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "stories"
    label: "Works"
    folder: "content/stories"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Excerpt", name: "excerpt", widget: "string"}
      - {label: "Story Content", name: "body", widget: "markdown"}

  - name: "essays"
    label: "Essays"
    folder: "content/essays"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Essay Content", name: "body", widget: "markdown"}

  - name: "photos"
    label: "Pictures"
    folder: "content/photos"
    create: true
    fields:
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Caption", name: "title", widget: "string"}
      - {label: "Date Taken", name: "date", widget: "datetime"}

  - name: "accomplishments"
    label: "Accomplishments"
    folder: "content/accomplishments"
    create: true
    fields:
      - {label: "Achievement Title", name: "title", widget: "string"}
      - {label: "Subtitle/Organization", name: "subtitle", widget: "string"}
      - {label: "Year", name: "year", widget: "string"}
      - {label: "Type", name: "type", widget: "select", options: ["Award", "Achievement", "Milestone", "Other"]}
