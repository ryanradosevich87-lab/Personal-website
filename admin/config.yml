backend:
  name: github
  repo: ryanradosevich87-lab/Personal-website
  branch: main
  base_url: https://voluble-gecko-170a26.netlify.app
  auth_endpoint: /auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "stories"
    label: "Works"
    folder: "content/stories"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Excerpt", name: "excerpt", widget: "string"}
      - {label: "Story Content", name: "body", widget: "markdown"}

  - name: "essays"
    label: "Essays"
    folder: "content/essays"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Essay Content", name: "body", widget: "markdown"}
