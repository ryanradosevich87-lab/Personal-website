<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Private Archive</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #2a2a2a;
    --text: #e8e2d9;
    --muted: #6b6560;
    --accent: #c9a96e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* SIDEBAR */
  nav {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 48px 0;
    z-index: 100;
  }

  .nav-logo { padding: 0 28px 40px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
  .nav-logo h1 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 300; }
  .nav-logo span { color: var(--accent); font-style: italic; }

  nav a {
    display: block;
    padding: 12px 28px;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  nav a.active { color: var(--accent); }

  /* MAIN CONTENT */
  main { margin-left: 220px; width: calc(100% - 220px); }

  section {
    padding: 80px;
    border-bottom: 1px solid var(--border);
    min-height: 100vh;
  }

  .hero-title { font-family: 'Playfair Display', serif; font-size: 60px; line-height: 1.1; margin-bottom: 20px; }
  .hero-title em { color: var(--accent); font-style: italic; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 40px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 30px;
  }

  .card-title { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 15px; }

  .card-link {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 16px;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 10px;
    margin-top: 20px;
  }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 700px;
    max-height: 90vh;
    padding: 40px;
    overflow-y: auto;
  }

  @media (max-width: 900px) {
    nav { width: 60px; }
    nav a span { display: none; }
    main { margin-left: 60px; width: calc(100% - 60px); }
    section { padding: 40px 20px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><h1>My <span>Portfolio</span></h1></div>
  <a href="#home" class="active"><span>Home</span></a>
  <a href="#stories"><span>Stories</span></a>
  <a href="#essays"><span>Essays</span></a>
  <a href="#accomplishments"><span>Awards</span></a>
</nav>

<main>
  <section id="home">
    <h1 class="hero-title">A place for <em>everything</em>.</h1>
    <p>Admin? <a href="/admin/" style="color:var(--accent)">Login to upload</a></p>
  </section>

  <section id="stories">
    <h2>Stories</h2>
    <div class="cards-grid" id="stories-grid"></div>
  </section>

  <section id="essays">
    <h2>Essays</h2>
    <div class="cards-grid" id="essays-grid"></div>
  </section>

  <section id="accomplishments">
    <h2>Accomplishments</h2>
    <div id="accomplishments-grid" class="cards-grid"></div>
  </section>
</main>

<div class="modal-bg" id="read-modal">
  <div class="modal">
    <button onclick="document.getElementById('read-modal').classList.remove('open')" style="float:right; color:white; background:none; border:none; cursor:pointer;">✕</button>
    <h2 id="read-title" style="font-family:'Playfair Display'; font-size:32px; margin-bottom:20px;"></h2>
    <div id="read-body" style="white-space: pre-wrap;"></div>
  </div>
</div>

<script>
  const GH_USER = "ryanradosevich87-lab"; 
  const GH_REPO = "Personal-website";

  async function loadContent(type) {
    const grid = document.getElementById(`${type}-grid`);
    if (!grid) return;

    try {
      const response = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/content/${type}`);
      const files = await response.json();
      grid.innerHTML = ''; 

      for (const file of files) {
        if (file.name.endsWith('.md')) {
          const contentRes = await fetch(file.download_url);
          const text = await contentRes.text();
          
          const title = text.match(/title:\s*"(.*)"/)?.[1] || file.name;
          const body = text.split('---').pop().trim();

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="card-title">${title}</div>
            <button class="card-link" onclick="openModal(\`${title}\`, \`${body.replace(/`/g, '\\`')}\`)">Read →</button>
          `;
          grid.appendChild(card);
        }
      }
    } catch (e) {
      grid.innerHTML = `<p class="muted">No ${type} yet.</p>`;
    }
  }

  function openModal(title, body) {
    document.getElementById('read-title').textContent = title;
    document.getElementById('read-body').innerHTML = body.replace(/\n/g, '<br>');
    document.getElementById('read-modal').classList.add('open');
  }

  // Identity Login Check
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) { window.netlifyIdentity.on("login", () => { location.reload(); }); }
    });
  }

  loadContent('stories');
  loadContent('essays');
  loadContent('accomplishments');
</script>
</body>
</html>
