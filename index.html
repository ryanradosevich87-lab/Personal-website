<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Ryan Radosevich</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #e0e0e0;
            --accent-color: #007bff;
            --card-bg: #1a1a1a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 5%;
            background: rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .admin-btn {
            background: var(--accent-color);
            padding: 5px 15px;
            border-radius: 4px;
            transition: opacity 0.2s;
        }

        .admin-btn:hover { opacity: 0.8; }

        /* Works Grid */
        .container { padding: 40px 5%; }
        
        #works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .work-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .work-card h3 { margin-top: 0; color: var(--accent-color); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">RYAN RADOSEVICH</div>
        <div class="links">
            <a href="#works">Works</a>
            <a href="admin/" class="admin-btn">Admin Login</a>
        </div>
    </nav>

    <div class="container">
        <h2 id="works">Selected Works</h2>
        <div id="works-grid">
            <p>Loading stories...</p>
        </div>
    </div>

    <script>
        async function loadContent(folder, targetId) {
            const repo = "ryanradosevich87-lab/Personal-website";
            const url = `https://api.github.com/repos/${repo}/contents/content/${folder}`;
            
            try {
                const response = await fetch(url);
                const files = await response.json();
                const grid = document.getElementById(targetId);
                grid.innerHTML = ''; // Clear loading text

                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const rawRes = await fetch(file.download_url);
                        const text = await rawRes.text();
                        
                        // Basic Meta-data parsing
                        const titleMatch = text.match(/title:\s*"(.*)"/) || text.match(/title:\s*(.*)/);
                        const title = titleMatch ? titleMatch[1] : file.name;

                        const card = document.createElement('div');
                        card.className = 'work-card';
                        card.innerHTML = `<h3>${title}</h3><p>Click to read more on GitHub.</p><a href="${file.html_url}" target="_blank" style="color:white">View Source</a>`;
                        grid.appendChild(card);
                    }
                }
            } catch (e) {
                console.error("Error loading content:", e);
            }
        }

        // Initialize loading
        loadContent('stories', 'works-grid');
    </script>
</body>
</html>
